<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Micro-Notes Generator | PrepPortal</title>
                <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
                    <style>
                            :root {
                                        --bg: #050505;
                                                    --main: #f5f5f5;
                                                                --muted: #888888;
                                                                            --danger: #ff3366;
                                                                                        --card: rgba(255, 255, 255, 0.02);
                                                                                                    --border: rgba(255, 255, 255, 0.08);
                                                                                                            }

                                                                                                                    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
                                                                                                                            body { background: var(--bg); color: var(--main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

                                                                                                                                    /* Navbar */
                                                                                                                                            .nav { width: 100%; padding: 1.5rem 2rem; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
                                                                                                                                                    .nav h2 { font-weight: 900; color: var(--danger); }
                                                                                                                                                            .nav a { color: var(--muted); text-decoration: none; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }

                                                                                                                                                                    /* Container */
                                                                                                                                                                            .wrapper { max-width: 600px; width: 90%; padding: 3rem 0; display: flex; flex-direction: column; gap: 2rem; }
                                                                                                                                                                                    .header h1 { font-size: 2.2rem; font-weight: 900; margin-bottom: 0.5rem; }
                                                                                                                                                                                            .header p { color: var(--muted); font-size: 0.9rem; }

                                                                                                                                                                                                    /* UI Elements */
                                                                                                                                                                                                            .box { background: var(--card); border: 1px solid var(--border); padding: 2rem; border-radius: 12px; text-align: center; }
                                                                                                                                                                                                                    .upload-zone { border: 2px dashed rgba(255, 51, 102, 0.2); padding: 2rem; border-radius: 10px; cursor: pointer; position: relative; }
                                                                                                                                                                                                                            .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                            .radio-group { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
                                                                                                                                                                                                                                                    .radio-item { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: var(--muted); }
                                                                                                                                                                                                                                                            input[type="radio"] { accent-color: var(--danger); width: 18px; height: 18px; }

                                                                                                                                                                                                                                                                    .btn { background: var(--danger); color: #000; border: none; padding: 1.2rem; border-radius: 8px; font-size: 1rem; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 1rem; }
                                                                                                                                                                                                                                                                            .btn:disabled { background: #222; color: #555; }

                                                                                                                                                                                                                                                                                    #status { margin-top: 1rem; font-size: 0.8rem; color: var(--danger); font-weight: 700; }
                                                                                                                                                                                                                                                                                        </style>
                                                                                                                                                                                                                                                                                        </head>
                                                                                                                                                                                                                                                                                        <body>

                                                                                                                                                                                                                                                                                            <nav class="nav">
                                                                                                                                                                                                                                                                                                    <h2>MICRO-NOTES.</h2>
                                                                                                                                                                                                                                                                                                            <a href="eduhub.html">Back to Hub</a>
                                                                                                                                                                                                                                                                                                                </nav>

                                                                                                                                                                                                                                                                                                                    <div class="wrapper">
                                                                                                                                                                                                                                                                                                                            <div class="header">
                                                                                                                                                                                                                                                                                                                                        <h1>Stealth Protocol</h1>
                                                                                                                                                                                                                                                                                                                                                    <p>Upload PDF and generate ultra-dense micro notes for your "survival kit".</p>
                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                    <div class="box">
                                                                                                                                                                                                                                                                                                                                                                                <div class="upload-zone">
                                                                                                                                                                                                                                                                                                                                                                                                <input type="file" id="pdfInput" accept=".pdf">
                                                                                                                                                                                                                                                                                                                                                                                                                <div style="font-size: 2.5rem; margin-bottom: 10px;">📄</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                <p>Tap to Select PDF</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                <div id="status">No file selected</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="box">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <p style="margin-bottom: 10px; font-weight: 700;">Select Density</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="radio-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <label class="radio-item"><input type="radio" name="fSize" value="5" checked> Size 5 (Pro)</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <label class="radio-item"><input type="radio" name="fSize" value="6"> Size 6 (Weak Eyes)</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <button class="btn" id="goBtn" style="width: 100%;">Deploy Generator</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const input = document.getElementById('pdfInput');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const status = document.getElementById('status');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const btn = document.getElementById('goBtn');

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                input.onchange = () => { if(input.files[0]) status.innerText = "Ready: " + input.files[0].name; };

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        btn.onclick = async () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const file = input.files[0];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if(!file) { alert("Pehle PDF select karo!"); return; }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const fontSize = document.querySelector('input[name="fSize"]:checked').value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        btn.innerText = "EXTRACTING TEXT...";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    btn.disabled = true;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const reader = new FileReader();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            reader.onload = async function() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            try {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const typedarray = new Uint8Array(this.result);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const pdfjsLib = window['pdfjs-dist/build/pdf'];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const pdf = await pdfjsLib.getDocument(typedarray).promise;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                let fullText = "";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    for(let i=1; i<=pdf.numPages; i++) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const page = await pdf.getPage(i);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const content = await page.getTextContent();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            fullText += content.items.map(s => s.str).join(" ") + " ";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const cleanText = fullText.replace(/\s+/g, ' ').trim();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Create dynamic print window
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const printWin = window.open('', '_blank');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const style = '<style>@page{margin:5mm;}body{font-family:sans-serif;font-size:'+fontSize+'pt;line-height:1;column-count:4;column-gap:4mm;text-align:justify;word-break:break-all;color:black;background:white;padding:10px;}</style>';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            printWin.document.write('<html><head>' + style + '</head><body>' + cleanText + '<\/body><script>window.onload=function(){setTimeout(function(){window.print();},1000);};<\/script><\/html>');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                printWin.document.close();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                } catch (e) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    alert("Error: PDF read nahi ho payi!");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    btn.innerText = "Deploy Generator";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    btn.disabled = false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                };
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            reader.readAsArrayBuffer(file);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    };
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </html>
