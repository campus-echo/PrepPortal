<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Micro-Notes Generator | PrepPortal</title>
                <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
                    <style>
                            :root {
                                        --bg-color: #050505;
                                                    --text-main: #f5f5f5;
                                                                --text-muted: #888888;
                                                                            --accent-red: #ff3366; /* Danger/Classified Vibe */
                                                                                        --card-bg: rgba(255, 255, 255, 0.02);
                                                                                                    --border: rgba(255, 255, 255, 0.08);
                                                                                                            }

                                                                                                                    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; cursor: none; }

                                                                                                                            body {
                                                                                                                                        background-color: var(--bg-color);
                                                                                                                                                    color: var(--text-main);
                                                                                                                                                                min-height: 100vh;
                                                                                                                                                                            display: flex;
                                                                                                                                                                                        flex-direction: column;
                                                                                                                                                                                                    align-items: center;
                                                                                                                                                                                                            }

                                                                                                                                                                                                                    .cursor {
                                                                                                                                                                                                                                width: 20px; height: 20px; border: 1px solid var(--accent-red); border-radius: 50%;
                                                                                                                                                                                                                                            position: fixed; pointer-events: none; z-index: 9999;
                                                                                                                                                                                                                                                        transform: translate(-50%, -50%); transition: 0.2s;
                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                        /* Navbar */
                                                                                                                                                                                                                                                                                .navbar {
                                                                                                                                                                                                                                                                                            width: 100%; padding: 1.5rem 3rem; display: flex; justify-content: space-between;
                                                                                                                                                                                                                                                                                                        align-items: center; border-bottom: 1px solid var(--border);
                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                        .navbar a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; text-transform: uppercase; transition: 0.3s; font-weight: 700; }
                                                                                                                                                                                                                                                                                                                                .navbar a:hover { color: var(--accent-red); }
                                                                                                                                                                                                                                                                                                                                        .navbar h2 { font-weight: 900; letter-spacing: -1px; color: var(--accent-red); }

                                                                                                                                                                                                                                                                                                                                                /* Main Workspace */
                                                                                                                                                                                                                                                                                                                                                        .workspace {
                                                                                                                                                                                                                                                                                                                                                                    max-width: 700px; width: 100%; padding: 4rem 2rem;
                                                                                                                                                                                                                                                                                                                                                                                display: flex; flex-direction: column; gap: 2rem;
                                                                                                                                                                                                                                                                                                                                                                                            animation: fadeInUp 0.8s ease forwards;
                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                            .header h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 0.5rem; }
                                                                                                                                                                                                                                                                                                                                                                                                                    .header p { color: var(--text-muted); font-size: 1rem; line-height: 1.5; }

                                                                                                                                                                                                                                                                                                                                                                                                                            /* Upload Area */
                                                                                                                                                                                                                                                                                                                                                                                                                                    .upload-box {
                                                                                                                                                                                                                                                                                                                                                                                                                                                border: 2px dashed rgba(255, 51, 102, 0.3);
                                                                                                                                                                                                                                                                                                                                                                                                                                                            background: var(--card-bg);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        padding: 3rem 2rem;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    border-radius: 12px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                text-align: center;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            transition: 0.3s;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        position: relative;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .upload-box:hover {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    border-color: var(--accent-red);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                background: rgba(255, 51, 102, 0.05);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .upload-box input[type="file"] {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        opacity: 0; cursor: pointer; /* Hidden input over the box */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .upload-icon { font-size: 3rem; margin-bottom: 1rem; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .upload-box h3 { font-size: 1.2rem; margin-bottom: 0.5rem; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .upload-box p { font-size: 0.85rem; color: var(--text-muted); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        #fileNameDisplay { margin-top: 1rem; color: var(--accent-red); font-weight: 700; font-size: 0.9rem; }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                /* Settings Area */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .settings-box {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    background: var(--card-bg); border: 1px solid var(--border);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                padding: 2rem; border-radius: 12px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .settings-box h4 { margin-bottom: 1rem; font-size: 1.1rem; color: var(--text-main); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .radio-group { display: flex; gap: 1.5rem; flex-wrap: wrap; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .radio-label {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    display: flex; align-items: center; gap: 10px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                color: var(--text-muted); font-size: 0.95rem; font-weight: 600;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .radio-label input[type="radio"] {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            accent-color: var(--accent-red); width: 18px; height: 18px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            /* Action Button */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .btn-generate {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                background: var(--accent-red); color: #000;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            border: none; padding: 1rem 2rem; border-radius: 8px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        font-size: 1rem; font-weight: 900; text-transform: uppercase;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    letter-spacing: 1px; transition: 0.3s; width: 100%;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                box-shadow: 0 4px 15px rgba(255, 51, 102, 0.3);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .btn-generate:hover {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            transform: translateY(-3px);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        box-shadow: 0 8px 25px rgba(255, 51, 102, 0.5);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                @media (max-width: 768px) { * { cursor: auto; } .cursor { display: none; } .workspace { padding: 2rem 1.5rem; } }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </style>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </head>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <body>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="cursor" id="cursor"></div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <nav class="navbar">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <h2>Micro-Notes.</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <a href="eduhub.html">← Back to Hub</a>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </nav>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="workspace">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="header">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <h1>Compression Protocol</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <p>Upload your standard PDF notes. Our algorithm will strip formatting and condense the text for maximum stealth.</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="upload-box" id="dropZone">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <input type="file" id="pdfUploader" accept=".pdf">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="upload-icon">📄</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <h3>Tap to Upload PDF</h3>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <p>Maximum size: 10MB</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div id="fileNameDisplay"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="settings-box">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <h4>Select Compression Level (Font Size)</h4>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="radio-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <label class="radio-label">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <input type="radio" name="fontSize" value="5" checked>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                Size 5 (Normal Vision)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <label class="radio-label">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <input type="radio" name="fontSize" value="6">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        Size 6 (Weak Eyesight)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </label>
