<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Micro-Notes Generator | PrepPortal</title>
                <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
                    <style>
                            :root {
                                        --bg-color: #050505;
                                                    --text-main: #f5f5f5;
                                                                --text-muted: #888888;
                                                                            --accent-red: #ff3366;
                                                                                        --card-bg: rgba(255, 255, 255, 0.02);
                                                                                                    --border: rgba(255, 255, 255, 0.08);
                                                                                                            }

                                                                                                                    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
                                                                                                                            
                                                                                                                                    body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

                                                                                                                                            /* Navbar */
                                                                                                                                                    .navbar { width: 100%; padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
                                                                                                                                                            .navbar a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; text-transform: uppercase; font-weight: 700; }
                                                                                                                                                                    .navbar h2 { font-weight: 900; color: var(--accent-red); }

                                                                                                                                                                            /* Main Workspace */
                                                                                                                                                                                    .workspace { max-width: 700px; width: 100%; padding: 4rem 2rem; display: flex; flex-direction: column; gap: 2rem; }
                                                                                                                                                                                            .header h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 0.5rem; }
                                                                                                                                                                                                    .header p { color: var(--text-muted); }

                                                                                                                                                                                                            /* Upload Area */
                                                                                                                                                                                                                    .upload-box { border: 2px dashed rgba(255, 51, 102, 0.3); background: var(--card-bg); padding: 3rem 2rem; border-radius: 12px; text-align: center; position: relative; transition: 0.3s; }
                                                                                                                                                                                                                            .upload-box:hover { border-color: var(--accent-red); background: rgba(255, 51, 102, 0.05); }
                                                                                                                                                                                                                                    .upload-box input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
                                                                                                                                                                                                                                            .upload-icon { font-size: 3rem; margin-bottom: 1rem; }

                                                                                                                                                                                                                                                    /* Settings Area */
                                                                                                                                                                                                                                                            .settings-box { background: var(--card-bg); border: 1px solid var(--border); padding: 2rem; border-radius: 12px; }
                                                                                                                                                                                                                                                                    .radio-group { display: flex; gap: 1.5rem; margin-top: 1rem; }
                                                                                                                                                                                                                                                                            .radio-label { display: flex; align-items: center; gap: 10px; color: var(--text-muted); font-weight: 600; cursor: pointer; }
                                                                                                                                                                                                                                                                                    input[type="radio"] { accent-color: var(--accent-red); width: 18px; height: 18px; }

                                                                                                                                                                                                                                                                                            /* Button */
                                                                                                                                                                                                                                                                                                    .btn-generate { background: var(--accent-red); color: #000; border: none; padding: 1rem 2rem; border-radius: 8px; font-size: 1rem; font-weight: 900; text-transform: uppercase; cursor: pointer; width: 100%; transition: 0.3s; }
                                                                                                                                                                                                                                                                                                            .btn-generate:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 51, 102, 0.4); }
                                                                                                                                                                                                                                                                                                                    .btn-generate:disabled { background: #333; color: #777; cursor: not-allowed; }

                                                                                                                                                                                                                                                                                                                            #fileName { margin-top: 1rem; color: var(--accent-red); font-weight: 700; font-size: 0.9rem; }
                                                                                                                                                                                                                                                                                                                                </style>
                                                                                                                                                                                                                                                                                                                                </head>
                                                                                                                                                                                                                                                                                                                                <body>

                                                                                                                                                                                                                                                                                                                                    <nav class="navbar">
                                                                                                                                                                                                                                                                                                                                            <h2>Micro-Notes.</h2>
                                                                                                                                                                                                                                                                                                                                                    <a href="eduhub.html">← Back to Hub</a>
                                                                                                                                                                                                                                                                                                                                                        </nav>

                                                                                                                                                                                                                                                                                                                                                            <div class="workspace">
                                                                                                                                                                                                                                                                                                                                                                    <div class="header">
                                                                                                                                                                                                                                                                                                                                                                                <h1>Compression Protocol</h1>
                                                                                                                                                                                                                                                                                                                                                                                            <p>PDF upload karo, aur size 5/6 ke mast micro-notes print karo.</p>
                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                            <div class="upload-box">
                                                                                                                                                                                                                                                                                                                                                                                                                        <input type="file" id="pdfUploader" accept=".pdf">
                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="upload-icon">📄</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                <h3>Tap to Upload PDF</h3>
                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div id="fileName"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="settings-box">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <h4>Font Size Selection</h4>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="radio-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <label class="radio-label"><input type="radio" name="fSize" value="5" checked> Size 5 (Normal)</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <label class="radio-label"><input type="radio" name="fSize" value="6"> Size 6 (Weak Eyes)</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button class="btn-generate" id="genBtn">Compress & Generate</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const uploader = document.getElementById('pdfUploader');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const fileNameDiv = document.getElementById('fileName');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const genBtn = document.getElementById('genBtn');

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            uploader.addEventListener('change', () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if(uploader.files.length > 0) fileNameDiv.textContent = `Target: ${uploader.files[0].name}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        genBtn.addEventListener('click', async () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const file = uploader.files[0];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if(!file) return alert("Bhai PDF toh select kar!");

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const size = document.querySelector('input[name="fSize"]:checked').value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        genBtn.textContent = "Processing...";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    genBtn.disabled = true;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const reader = new FileReader();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            reader.onload = async function() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const typedarray = new Uint8Array(this.result);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const pdfjsLib = window['pdfjs-dist/build/pdf'];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const pdf = await pdfjsLib.getDocument(typedarray).promise;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            let text = "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            for(let i=1; i<=pdf.numPages; i++) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const page = await pdf.getPage(i);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const content = await page.getTextContent();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        text += content.items.map(s => s.str).join(" ") + " ";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const clean = text.replace(/\s+/g, ' ').trim();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const win = window.open('', '_blank');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        win.document.write(`<html><head><style>@page{margin:5mm;}body{font-family:sans-serif;font-size:\${size}pt;line-height:1;column-count:4;column-gap:4mm;text-align:justify;word-break:break-all;color:black;background:white;}</style></head><body>\${clean}<script>setTimeout(()=>{window.print();window.close();},700);<\/script></body></html>`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        win.document.close();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        genBtn.textContent = "Compress & Generate";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        genBtn.disabled = false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    };
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                reader.readAsArrayBuffer(file);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </html>
