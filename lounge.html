<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>The Echo Lounge | PrepPortal</title>
                <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;900&display=swap" rel="stylesheet">
                    <style>
                            :root { --bg: #000; --main: #fff; --accent: #ff3366; --border: rgba(255, 255, 255, 0.05); }
                                    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
                                            body { background: var(--bg); color: var(--main); height: 100vh; overflow: hidden; }

                                                    @keyframes revealBlur {
                                                                0% { opacity: 0; filter: blur(20px); transform: translateY(40px); }
                                                                            100% { opacity: 1; filter: blur(0); transform: translateY(0); }
                                                                                    }

                                                                                            .namma-container { 
                                                                                                        display: flex; flex-direction: column; height: 100%; max-width: 900px; margin: 0 auto; 
                                                                                                                    border-left: 1px solid var(--border); border-right: 1px solid var(--border);
                                                                                                                                animation: revealBlur 1.5s cubic-bezier(0.19, 1, 0.22, 1);
                                                                                                                                        }
                                                                                                                                                
                                                                                                                                                        .header { padding: 60px 40px; border-bottom: 1px solid var(--border); }
                                                                                                                                                                .header h1 { font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; }

                                                                                                                                                                        #chat-window { flex: 1; overflow-y: auto; padding: 40px; scrollbar-width: none; }
                                                                                                                                                                                .msg-box { margin-bottom: 45px; }
                                                                                                                                                                                        .msg-meta { font-size: 0.65rem; color: #444; letter-spacing: 2px; margin-bottom: 10px; }
                                                                                                                                                                                                .msg-text { font-size: 1.2rem; line-height: 1.5; color: #ccc; font-weight: 300; }
                                                                                                                                                                                                        
                                                                                                                                                                                                                .input-bar { padding: 40px; border-top: 1px solid var(--border); display: flex; gap: 20px; }
                                                                                                                                                                                                                        input { 
                                                                                                                                                                                                                                    flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--border); 
                                                                                                                                                                                                                                                color: #fff; padding: 15px 0; font-size: 1rem; outline: none; 
                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                        .echo-btn { 
                                                                                                                                                                                                                                                                                    background: transparent; color: var(--main); border: 1px solid var(--border); 
                                                                                                                                                                                                                                                                                                padding: 12px 30px; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; font-weight: 900;
                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                #auth-overlay { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; }
                                                                                                                                                                                                                                                                                                                    </style>
                                                                                                                                                                                                                                                                                                                    </head>
                                                                                                                                                                                                                                                                                                                    <body>

                                                                                                                                                                                                                                                                                                                        <div id="auth-overlay">
                                                                                                                                                                                                                                                                                                                                <div style="text-align: center;">
                                                                                                                                                                                                                                                                                                                                            <h1 style="font-size: 3rem; margin-bottom: 40px;">THE ECHO LOUNGE.</h1>
                                                                                                                                                                                                                                                                                                                                                        <div id="login-step"><button class="echo-btn" onclick="handleLogin()">Sign in with Google</button></div>
                                                                                                                                                                                                                                                                                                                                                                    <div id="username-step" style="display: none;">
                                                                                                                                                                                                                                                                                                                                                                                    <input type="text" id="new-username" placeholder="CHOOSE AN ALIAS" style="text-align: center; border-bottom: 1px solid #444;">
                                                                                                                                                                                                                                                                                                                                                                                                    <br><br><button class="echo-btn" onclick="saveUsername()">Lock Identity</button>
                                                                                                                                                                                                                                                                                                                                                                                                                    <p id="error-msg" style="color: var(--accent); margin-top: 10px; font-size: 0.7rem;"></p>
                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="namma-container">
                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="header"><h1>The Echo Lounge</h1></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div id="chat-window"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="input-bar">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <input type="text" id="chatInput" placeholder="WRITE INTO THE VOID...">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button class="echo-btn" onclick="sendMessage()">Echo →</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <script type="module">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        import { getDatabase, ref, set, push, onValue, query, limitToLast, serverTimestamp, get } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const firebaseConfig = {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            apiKey: "AIzaSyByag0i5Tt3wmhKoyjFSaU7XC2MIT-0e4U",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        authDomain: "prepportal-lounge.firebaseapp.com",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    databaseURL: "https://prepportal-lounge-default-rtdb.firebaseio.com",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                projectId: "prepportal-lounge",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            storageBucket: "prepportal-lounge.firebasestorage.app",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        messagingSenderId: "815756076209",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    appId: "1:815756076209:web:bfa5437fd28502bfe9ee90",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                measurementId: "G-6MTV952LJN"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        };

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const app = initializeApp(firebaseConfig);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const auth = getAuth(app);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const db = getDatabase(app);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const provider = new GoogleAuthProvider();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const prohibited = ["AADIT", "AAYUSHI", "ABHAY", "ABHISHEK", "ADITYA", "ADIT", "AJAY", "AKASH", "AMAN", "ANIKET", "ANKIT", "ANSHUMAN", "ANURAG", "ARJUN", "ARPIT", "ARYAN", "ASHISH", "ATHARV", "BHANU", "BHOOMIKA", "BOBBY", "DEEKSHA", "DEVANSH", "DIVYA", "GURJOT", "HAREE", "HARISHANKAR", "HARSH", "HARSHIT", "HRISHI", "JAY", "KESHAV", "KRISHNA", "KRISHNAKANT", "KRITIKA", "MAHENDRA", "MANYA", "MISTHI", "MOHIT", "NEHAL", "NIHAL", "NISHANT", "OM", "PINTU", "PIYUSH", "PRATHAK", "RAHUL", "RAJNEESH", "RAMJAS", "RAVI", "RICHA", "RISHI", "SACHIN", "SAJAL", "SATYAM", "SHALEEN", "SHASHANK", "SHAURYA", "SHIVAM", "SOHAM", "SOURAV", "SUJAL", "TANISHQ", "TUSHAR", "UMESH", "VAISHNAVI", "VEERENDRA", "VYOM", "YATHARTH", "YUGANT", "VERMA", "SINGH", "THAKUR", "ARGAL", "GUPTA", "JATAV", "BHARDWAJ", "KARAIYA", "CHAUHAN", "TOMAR", "BHUJWA", "BHADORIYA", "SHARMA", "RAJAWAT", "SAINI", "BANBARIYA", "PARMAR", "GURJAR", "AGRAWAL", "TYAGI", "PRAJAPATI", "AHIRWAR", "SISODIYA", "KIRAR", "KIRAD", "KANSANA", "BHAWARE", "KULSHRESTHA", "KUSHWAH", "ARMO", "SHRIVASTAVA", "SHROTI", "BATHAM", "DANDOTIYA", "CHAUDHARY", "TRIPATHI", "NARWARIYA", "SHAKYA", "DAHERIYA", "PANDEY", "SONKAR", "PATEL", "RAGHUWANSHI", "BUDDHE", "DUBEY", "SIKARWAR", "DANIEL", "BHADOURIA", "RISHISHWAR", "PATHARIYA", "SWARNKAR", "DHAKAR", "SHUKLA", "MISHRA", "JAIN", "TANKLE", "AGARWAL", "KAILASIYA", "BTCE2501"];

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        window.handleLogin = () => signInWithPopup(auth, provider);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                onAuthStateChanged(auth, async (user) => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (user) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const snapshot = await get(ref(db, `users/${user.uid}`));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (snapshot.exists()) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                sessionStorage.setItem('alias', snapshot.val().username);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    enterLounge();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('login-step').style.display = 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('username-step').style.display = 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        window.saveUsername = async () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const name = document.getElementById('new-username').value.trim().toUpperCase();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (name.length < 3) return document.getElementById('error-msg').innerText = "ALIAS TOO SHORT.";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (prohibited.some(p => name.includes(p))) return document.getElementById('error-msg').innerText = "PROHIBITED NAME.";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        await set(ref(db, `users/${auth.currentUser.uid}`), { username: name });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    sessionStorage.setItem('alias', name);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                enterLounge();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        };

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function enterLounge() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('auth-overlay').style.display = 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        loadMessages();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        window.sendMessage = () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const text = document.getElementById('chatInput').value.trim();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (!text) return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            push(ref(db, 'messages'), {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            text,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            sender: sessionStorage.getItem('alias'),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            timestamp: serverTimestamp()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('chatInput').value = '';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            };

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function loadMessages() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const msgRef = query(ref(db, 'messages'), limitToLast(50));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            onValue(msgRef, (snapshot) => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const win = document.getElementById('chat-window');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            win.innerHTML = '';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            snapshot.forEach((child) => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const data = child.val();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    win.innerHTML += `<div class="msg-box"><div class="msg-meta">${data.sender}</div><div class="msg-text">${data.text}</div></div>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    win.scrollTop = win.scrollHeight;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </html>
