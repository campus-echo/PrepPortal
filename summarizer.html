<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>AI Summarizer | PrepPortal</title>
                <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
                    <style>
                            :root {
                                        --bg: #050505;
                                                    --main: #f5f5f5;
                                                                --muted: #888888;
                                                                            --accent: #ff3366;
                                                                                        --card: rgba(255, 255, 255, 0.02);
                                                                                                    --border: rgba(255, 255, 255, 0.08);
                                                                                                            }

                                                                                                                    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
                                                                                                                            body { background: var(--bg); color: var(--main); min-height: 100vh; overflow-x: hidden; }

                                                                                                                                    /* Moving Cyber Grid Animation */
                                                                                                                                            .bg-grid {
                                                                                                                                                        position: fixed; inset: 0;
                                                                                                                                                                    background-image: linear-gradient(var(--border) 1px, transparent 1px), 
                                                                                                                                                                                                  linear-gradient(90deg, var(--border) 1px, transparent 1px);
                                                                                                                                                                                                              background-size: 40px 40px; z-index: -1;
                                                                                                                                                                                                                          animation: gridMove 15s linear infinite;
                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                          @keyframes gridMove { from { transform: translateY(0); } to { transform: translateY(40px); } }

                                                                                                                                                                                                                                                  .nav { width: 100%; padding: 1.5rem 2rem; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--bg); }
                                                                                                                                                                                                                                                          .nav h2 { font-weight: 900; color: var(--accent); letter-spacing: -1px; }
                                                                                                                                                                                                                                                                  .nav a { color: var(--muted); text-decoration: none; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }

                                                                                                                                                                                                                                                                          .header { text-align: center; padding: 4rem 1rem 2rem; }
                                                                                                                                                                                                                                                                                  .glitch {
                                                                                                                                                                                                                                                                                              font-size: 2.8rem; font-weight: 900; color: var(--main);
                                                                                                                                                                                                                                                                                                          position: relative; display: inline-block;
                                                                                                                                                                                                                                                                                                                      animation: mainGlitch 3s infinite;
                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                      @keyframes mainGlitch {
                                                                                                                                                                                                                                                                                                                                                  0% { text-shadow: 2px 0 var(--accent), -2px 0 #00fffb; }
                                                                                                                                                                                                                                                                                                                                                              2% { transform: skewX(10deg); }
                                                                                                                                                                                                                                                                                                                                                                          4% { transform: skewX(0deg); }
                                                                                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                                                                                          .wrapper { max-width: 700px; width: 92%; margin: 0 auto; padding-bottom: 5rem; }

                                                                                                                                                                                                                                                                                                                                                                                                  .switcher { display: flex; gap: 10px; margin-bottom: 1.5rem; }
                                                                                                                                                                                                                                                                                                                                                                                                          .mode-card {
                                                                                                                                                                                                                                                                                                                                                                                                                      flex: 1; padding: 1.2rem; background: var(--card); border: 1px solid var(--border);
                                                                                                                                                                                                                                                                                                                                                                                                                                  border-radius: 12px; cursor: pointer; transition: 0.4s; text-align: center;
                                                                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                                                                                  .mode-card.active { border-color: var(--accent); background: rgba(255, 51, 102, 0.05); transform: translateY(-3px); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                          .mode-card h3 { font-size: 0.9rem; margin-bottom: 4px; color: var(--main); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  .mode-card p { font-size: 0.7rem; color: var(--muted); }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                          .input-box {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      background: var(--card); border: 1px solid var(--border);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  padding: 1.5rem; border-radius: 15px; animation: fadeInUp 1s ease;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  .upload-section {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              border: 1px dashed var(--border); padding: 1.5rem; border-radius: 10px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          margin-bottom: 1.5rem; text-align: center; cursor: pointer; position: relative;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      transition: 0.3s;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      .upload-section:hover { border-color: var(--accent); background: rgba(255, 255, 255, 0.01); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              #pdfFile { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      textarea {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  width: 100%; height: 150px; background: transparent; border: none;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              color: var(--main); font-size: 1rem; outline: none; resize: none;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          border-bottom: 1px solid var(--border); margin-bottom: 1.5rem;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          .btn-gen {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      width: 100%; padding: 1rem; background: var(--accent); color: #000;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  border: none; border-radius: 8px; font-weight: 900; font-size: 0.9rem;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              text-transform: uppercase; cursor: pointer; transition: 0.3s;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              .btn-gen:hover { letter-spacing: 1px; box-shadow: 0 0 20px rgba(255, 51, 102, 0.3); }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      .result-container { margin-top: 2rem; display: none; animation: fadeInUp 0.5s forwards; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              .result-card { background: rgba(255,255,255,0.03); padding: 2rem; border-radius: 12px; border-left: 4px solid var(--accent); }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </style>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </head>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <body>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="bg-grid"></div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <nav class="nav">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <h2>SUMMARIZER.</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <a href="eduhub.html">← Dashboard</a>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </nav>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="wrapper">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="header">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <h1 class="glitch">GEMINI SYNTHESIS</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <p style="color: var(--muted); margin-top: 10px; font-size: 0.9rem;">Powered by Gemini 1.5 Flash for Maximum Accuracy.</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="switcher">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="mode-card active" id="contentMode" onclick="setMode('content')">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <h3>Content Crusher</h3>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <p>PDFs / Transcripts</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="mode-card" id="syllabusMode" onclick="setMode('syllabus')">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <h3>Syllabus Master</h3>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <p>Topic Names Only</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="input-box">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="upload-section" id="dropZone">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <input type="file" id="pdfFile" accept=".pdf">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div style="font-size: 1.5rem; margin-bottom: 5px;">📄</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <p id="fileStatus" style="color: var(--muted); font-size: 0.8rem;">Upload Engineering PDF (Optional)</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <textarea id="mainInput" placeholder="Enter topics or paste text..."></textarea>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <button class="btn-gen" id="runBtn">Initiate AI Extraction</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="result-container" id="results">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="result-card">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <h3 style="margin-bottom: 15px; color: var(--accent); font-size: 1.1rem;">Extracted Core Insights:</h3>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div id="output" style="line-height: 1.6; font-size: 0.95rem; color: #ddd; white-space: pre-line;">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <button class="btn-gen" style="background: #fff; margin-top: 20px; color: #000;" onclick="exportToMicro()">Export to Micro-Notes</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const fileInput = document.getElementById('pdfFile');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const fileStatus = document.getElementById('fileStatus');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const mainInput = document.getElementById('mainInput');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const runBtn = document.getElementById('runBtn');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const output = document.getElementById('output');

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      fileInput.onchange = () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if(fileInput.files[0]) fileStatus.innerText = "File Attached: " + fileInput.files[0].name;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          };

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  function setMode(mode) {
